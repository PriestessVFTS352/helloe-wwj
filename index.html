<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; min-height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #FAF7F2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  .container { width: 960px; height: 540px; position: relative; background: #FFFFFF; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-radius: 12px; overflow: hidden; }
  svg { user-select: none; }
  text { pointer-events: none; }
  .draggable { cursor: grab; touch-action: none; }
  .draggable:active { cursor: grabbing; }
  .assembled { filter: drop-shadow(0 0 6px rgba(76, 201, 240, 0.6)); }
  .flame {
    transform-origin: center bottom;
    animation: flicker 0.4s infinite alternate ease-in-out;
    transform-box: fill-box;
  }
  @keyframes flicker {
    0% { transform: scale(0.95) rotate(-2deg); opacity: 0.8; }
    100% { transform: scale(1.05) rotate(2deg); opacity: 1; }
  }
  .panel { fill: #F8F9FA; stroke: #E9ECEF; stroke-width: 1.5; }
  .btn-hover { transition: all 0.2s ease; }
  .btn-hover:hover { opacity: 0.8; }

/* ================= 遮罩组件独立样式 ================= */
.main-wrapper { display: flex !important; align-items: flex-start !important; gap: 20px !important; }
.side-panel { display: flex !important; flex-direction: column !important; gap: 15px !important; }
.mask-controls-box { background-color: #FAF7F2 !important; padding: 12px 8px !important; border-radius: 10px !important; border: 1px solid #E5D5C5 !important; box-shadow: 0 4px 16px rgba(92, 74, 61, 0.08) !important; display: flex !important; flex-direction: column !important; gap: 8px !important; width: 48px !important; align-items: center !important; }
.mask-title { font-size: 12px !important; font-weight: 600 !important; color: #5C4A3D !important; text-align: center !important; margin-bottom: 2px !important; letter-spacing: 1px !important; line-height: 1 !important; }
.mask-controls-box .html-btn { appearance: none !important; -webkit-appearance: none !important; width: 32px !important; height: 32px !important; border: none !important; border-radius: 6px !important; cursor: pointer !important; transition: all 0.2s ease !important; display: flex !important; align-items: center !important; justify-content: center !important; padding: 0 !important; position: relative !important; left: auto !important; top: auto !important; right: auto !important; bottom: auto !important; }
.mask-controls-box .html-btn:active { transform: translateY(2px) !important; }
.mask-controls-box .btn-add { background-color: #5C4A3D !important; color: #FFFFFF !important; box-shadow: 0 2px 6px rgba(92, 74, 61, 0.2) !important; }
.mask-controls-box .btn-add:hover { background-color: #4A3A2E !important; }
.mask-controls-box .btn-toggle { background-color: #FFFFFF !important; color: #5C4A3D !important; border: 1px solid #5C4A3D !important; }
.mask-controls-box .btn-toggle:hover { background-color: #F5EBE0 !important; }
.mask-controls-box .btn-clear { background-color: #FFFFFF !important; color: #5C4A3D !important; border: 1px solid #5C4A3D !important; }
.mask-controls-box .btn-clear:hover { background-color: #F5EBE0 !important; }
.mask-controls-box .btn-icon { width: 16px !important; height: 16px !important; display: block !important; fill: currentColor !important; stroke: none !important; background: transparent !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; pointer-events: none !important; }
.mask-controls-box .btn-icon * { fill: currentColor !important; stroke: none !important; }
#maskToggleBtn .icon-eye-closed { display: none !important; }
#maskToggleBtn[data-state="hidden"] .icon-eye-open { display: none !important; }
#maskToggleBtn[data-state="hidden"] .icon-eye-closed { display: block !important; }
.draggable-mask { cursor: move; }

/* ================= 主画布通用遮罩样式 ================= */
.download-mask-shell { display: flex !important; align-items: flex-start !important; gap: 20px !important; }
.download-mask-toolbar { display: flex !important; flex-direction: column !important; gap: 15px !important; }
.download-mask-controls { background-color: #FAF7F2 !important; padding: 12px 8px !important; border-radius: 10px !important; border: 1px solid #E5D5C5 !important; box-shadow: 0 4px 16px rgba(92, 74, 61, 0.08) !important; display: flex !important; flex-direction: column !important; gap: 8px !important; width: 48px !important; align-items: center !important; }
.download-mask-title { font-size: 12px !important; font-weight: 600 !important; color: #5C4A3D !important; text-align: center !important; margin-bottom: 2px !important; letter-spacing: 1px !important; line-height: 1 !important; }
.download-mask-controls .html-btn { appearance: none !important; -webkit-appearance: none !important; width: 32px !important; height: 32px !important; border: none !important; border-radius: 6px !important; cursor: pointer !important; transition: all 0.2s ease !important; display: flex !important; align-items: center !important; justify-content: center !important; padding: 0 !important; position: relative !important; left: auto !important; top: auto !important; right: auto !important; bottom: auto !important; }
.download-mask-controls .html-btn:active { transform: translateY(2px) !important; }
.download-mask-controls .btn-add { background-color: #5C4A3D !important; color: #FFFFFF !important; box-shadow: 0 2px 6px rgba(92, 74, 61, 0.2) !important; }
.download-mask-controls .btn-add:hover { background-color: #4A3A2E !important; }
.download-mask-controls .btn-toggle,
.download-mask-controls .btn-clear { background-color: #FFFFFF !important; color: #5C4A3D !important; border: 1px solid #5C4A3D !important; }
.download-mask-controls .btn-toggle:hover,
.download-mask-controls .btn-clear:hover { background-color: #F5EBE0 !important; }
.download-mask-controls .btn-icon { width: 16px !important; height: 16px !important; display: block !important; fill: currentColor !important; stroke: none !important; background: transparent !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; pointer-events: none !important; }
.download-mask-controls .btn-icon * { fill: currentColor !important; stroke: none !important; }
#downloadMaskToggleBtn .icon-eye-closed { display: none !important; }
#downloadMaskToggleBtn[data-state="hidden"] .icon-eye-open { display: none !important; }
#downloadMaskToggleBtn[data-state="hidden"] .icon-eye-closed { display: block !important; }
[data-mask-stage-root="true"] { position: relative !important; overflow: hidden !important; }
[data-mask-overlay="true"] { position: absolute !important; inset: 0 !important; z-index: 2147483000 !important; pointer-events: none !important; overflow: hidden !important; }
[data-mask-overlay="true"][data-hidden="true"] { display: none !important; }
.download-mask-block { position: absolute !important; background: #FFFFFF !important; border-radius: 8px !important; border: 1px solid #E5D5C5 !important; box-shadow: 0 6px 20px rgba(92, 74, 61, 0.16) !important; pointer-events: auto !important; cursor: move !important; user-select: none !important; touch-action: none !important; min-width: 30px !important; min-height: 30px !important; }
.download-mask-handle { position: absolute !important; right: 0 !important; bottom: 0 !important; width: 16px !important; height: 16px !important; cursor: nwse-resize !important; background: linear-gradient(135deg, transparent 48%, #C4B5A5 48%, #C4B5A5 70%, transparent 70%) !important; border-bottom-right-radius: 8px !important; touch-action: none !important; }

/* ================= 暂停交互样式 ================= */
html.svgzhenli-paused *,
body.svgzhenli-paused * {
  animation-play-state: paused !important;
}
[data-svgzhenli-pause-hint="true"] {
  position: fixed !important;
  left: 50% !important;
  bottom: 12px !important;
  transform: translateX(-50%) !important;
  z-index: 2147483200 !important;
  padding: 4px 10px !important;
  border-radius: 999px !important;
  border: 1px solid rgba(229, 213, 197, 0.9) !important;
  background: rgba(250, 247, 242, 0.82) !important;
  color: rgba(92, 74, 61, 0.78) !important;
  font: 500 11px/1.2 -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif !important;
  letter-spacing: 0.02em !important;
  box-shadow: 0 10px 30px rgba(92, 74, 61, 0.1) !important;
  pointer-events: none !important;
  user-select: none !important;
  backdrop-filter: blur(6px) !important;
  -webkit-backdrop-filter: blur(6px) !important;
}
[data-svgzhenli-pause-floating-shell="true"] {
  position: fixed !important;
  left: 50% !important;
  bottom: 18px !important;
  transform: translateX(-50%) !important;
  z-index: 2147483250 !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 10px !important;
  align-items: flex-end !important;
  pointer-events: none !important;
}
[data-svgzhenli-pause-floating-shell="true"][data-svgzhenli-pause-placement="bottom-right"] {
  left: auto !important;
  right: 18px !important;
  transform: none !important;
}
[data-svgzhenli-pause-floating-shell="true"][data-svgzhenli-pause-placement="bottom-center"] {
  align-items: center !important;
}
[data-svgzhenli-pause-floating-shell="true"] [data-svgzhenli-pause-btn="true"] {
  pointer-events: auto !important;
  width: 32px !important;
  height: 32px !important;
  border-radius: 6px !important;
  border: 1px solid rgba(229, 213, 197, 0.95) !important;
  background: #FFFFFF !important;
  color: #5C4A3D !important;
  box-shadow: 0 4px 16px rgba(92, 74, 61, 0.08) !important;
}
[data-svgzhenli-pause-floating-shell="true"] [data-svgzhenli-pause-btn="true"]:hover {
  background: #F5EBE0 !important;
}
[data-svgzhenli-pause-floating-shell="true"] .btn-icon {
  width: 18px !important;
  height: 18px !important;
}
.mask-controls-box [data-svgzhenli-pause-btn="true"],
.download-mask-controls [data-svgzhenli-pause-btn="true"] {
  background-color: #FFFFFF !important;
  color: #5C4A3D !important;
  border: 1px solid #5C4A3D !important;
}
.mask-controls-box [data-svgzhenli-pause-btn="true"]:hover,
.download-mask-controls [data-svgzhenli-pause-btn="true"]:hover {
  background-color: #F5EBE0 !important;
}
[data-svgzhenli-pause-btn="true"] .icon-play {
  display: none !important;
}
[data-svgzhenli-pause-btn="true"][data-svgzhenli-pause-mode="paused"] .icon-pause {
  display: none !important;
}
[data-svgzhenli-pause-btn="true"][data-svgzhenli-pause-mode="paused"] .icon-play {
  display: block !important;
}

</style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 960 540" id="mainSVG" width="100%" height="100%">
      <defs>
        <linearGradient id="glass-shine" x1="0%" y1="0%" x2="100%" y2="0%">

      <g id="btn-global-pause" class="btn-hover" style="cursor: pointer;" transform="translate(680, 380)">
        <rect width="150" height="36" rx="8" fill="#E63946" filter="url(#shadow)"></rect>
        <text x="75" y="23" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold" id="text-global-pause">⏸ 暂停全局实验</text>
      </g>
      <text x="755" y="435" font-size="11" fill="#ADB5BD" text-anchor="middle">亦可使用 Space 空格键</text>

      <g transform="translate(890, 310)">
        <rect x="-15" y="-160" width="30" height="320" rx="15" fill="#FFFFFF" stroke="#343A40" stroke-width="2" filter="url(#shadow)"></rect>
        <rect x="-15" y="-160" width="30" height="320" rx="15" fill="url(#glass-shine)" pointer-events="none"></rect>

        <rect id="big-thermo-line" x="-5" y="135" width="10" height="25" rx="3" fill="url(#thermo-grad)"></rect> 
        <path d="M-15,135 L-5,135 M-15,105 L-5,105 M-15,75 L-5,75 M-15,45 L-5,45 M-15,15 L-5,15 M-15,-15 L-5,-15 M-15,-45 L-5,-45 M-15,-75 L-5,-75 M-15,-105 L-5,-105 M-15,-135 L-5,-135" stroke="#343A40" stroke-width="1.5"></path>
        <text x="-22" y="140" font-size="12" text-anchor="end" fill="#343A40">20</text>
        <text x="-22" y="110" font-size="12" text-anchor="end" fill="#343A40">30</text>
        <text x="-22" y="80" font-size="12" text-anchor="end" fill="#343A40">40</text>
        <text x="-22" y="50" font-size="12" text-anchor="end" fill="#343A40">50</text>
        <text x="-22" y="20" font-size="12" text-anchor="end" fill="#343A40">60</text>

  <script>
    let temp = 20;
    let isPaused = false;
    
    const assembled = { lamp: false, mesh: false, beaker: false, board: false, thermometer: false };
    
    const targets = {
      thermometer: { x: 330, y: 220 }, 
      board: { x: 330, y: 255 },
      beaker: { x: 330, y: 300 },
      mesh: { x: 330, y: 345 },
      lamp: { x: 330, y: 400 }
    };

    const currentPos = {
      thermometer: { x: 530, y: 80 },
      board: { x: 530, y: 160 },
      beaker: { x: 530, y: 260 },
      mesh: { x: 530, y: 350 },
      lamp: { x: 530, y: 440 }
    };

    const items = ['lamp', 'mesh', 'beaker', 'board', 'thermometer'];

    function updateTransforms() {
      items.forEach(id => {
        const el = document.getElementById(id);
        el.setAttribute('transform', `translate(${currentPos[id].x}, ${currentPos[id].y})`);
        if(assembled[id]) {
          el.classList.add('assembled');
        } else {
          el.classList.remove('assembled');
        }
      });
    }

    function resetDOMOrder() {
      const container = document.getElementById('drag-container');
      items.forEach(id => container.appendChild(document.getElementById(id)));
    }

    updateTransforms();
    resetDOMOrder();

    const svg = document.getElementById('mainSVG');
    let dragging = null;
    let offset = { x: 0, y: 0 };
    let activePointerId = null;

    // 鼠标/触摸通用：按下开始拖拽
    svg.addEventListener('pointerdown', e => {
      const target = e.target.closest('.draggable');
      if (!target) return;

      // 防止拖拽时触发浏览器默认行为（如页面滚动、选中文字）
      e.preventDefault();
      
      dragging = target.id;
      activePointerId = e.pointerId;
      
      // 将元素移到最上层
      target.parentNode.appendChild(target);
      
      let pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      pt = pt.matrixTransform(svg.getScreenCTM().inverse());
      offset.x = pt.x - currentPos[dragging].x;
      offset.y = pt.y - currentPos[dragging].y;
      
      assembled[dragging] = false;
      updateTransforms();

      // 捕获指针，保证后续事件都发到这个 svg 元素上
      svg.setPointerCapture(activePointerId);
    });

    // 移动
    svg.addEventListener('pointermove', e => {
      if (!dragging || e.pointerId !== activePointerId) return;
      e.preventDefault();
      
      let pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      pt = pt.matrixTransform(svg.getScreenCTM().inverse());
      
      currentPos[dragging].x = pt.x - offset.x;
      currentPos[dragging].y = pt.y - offset.y;
      updateTransforms();
    });

    // 松开（鼠标、手指抬起都触发）
    svg.addEventListener('pointerup', e => {
      if (!dragging || e.pointerId !== activePointerId) return;
      endDrag();
    });

    // 如果指针意外丢失（比如手势中断）
    svg.addEventListener('lostpointercapture', e => {
      if (!dragging || e.pointerId !== activePointerId) return;
      endDrag();
    });

    // 通用释放处理
    function endDrag() {
      const tx = targets[dragging].x;
      const ty = targets[dragging].y;
      const dx = currentPos[dragging].x - tx;
      const dy = currentPos[dragging].y - ty;
      if (Math.sqrt(dx*dx + dy*dy) < 45) {
        currentPos[dragging].x = tx;
        currentPos[dragging].y = ty;
        assembled[dragging] = true;
      }
      updateTransforms();
      resetDOMOrder();
      dragging = null;
      activePointerId = null;
      // 释放指针捕获
      if (svg.hasPointerCapture && svg.hasPointerCapture(activePointerId)) {
        svg.releasePointerCapture(activePointerId);
      }
    }

    // ===== 秒表逻辑（不变） =====
    let swTime = 0;
    let swRunning = false;
    
    const btnToggle = document.getElementById('btn-sw-toggle');
    const btnReset = document.getElementById('btn-sw-reset');
    const swText = document.getElementById('text-sw-time');

    btnToggle.addEventListener('click', () => {
      swRunning = !swRunning;
      btnToggle.querySelector('rect').setAttribute('fill', swRunning ? '#C1121F' : '#E63946');
    });

    btnReset.addEventListener('click', () => {
      swRunning = false;
      swTime = 0;
      btnToggle.querySelector('rect').setAttribute('fill', '#E63946');
      updateStopwatchDisplay();
    });

    function updateStopwatchDisplay() {
      let totalMs = Math.floor(swTime);
      let m = Math.floor(totalMs / 60000);
      let s = Math.floor((totalMs % 60000) / 1000);
      let ms = Math.floor((totalMs % 1000) / 100);
      swText.textContent = (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s) + '.' + ms;
    }

    // ===== 全局暂停按钮（不变） =====
    const btnGlobal = document.getElementById('btn-global-pause');
    const textGlobal = document.getElementById('text-global-pause');
    const rectGlobal = btnGlobal.querySelector('rect');

    function toggleGlobalPause() {
      isPaused = !isPaused;
      if (isPaused) {
        textGlobal.textContent = "▶ 恢复实验画面";
        rectGlobal.setAttribute('fill', '#2A9D8F');
      } else {
        textGlobal.textContent = "⏸ 暂停全局实验";
        rectGlobal.setAttribute('fill', '#E63946');
      }
    }

    btnGlobal.addEventListener('click', toggleGlobalPause);
    window.addEventListener('keydown', e => {
      if(e.code === 'Space') {
        toggleGlobalPause();
        e.preventDefault();
      }
    });

    // ===== 气泡系统（不变） =====
    const maxBubbles = 20;
    let bubbleData = Array(maxBubbles).fill(null).map(() => ({ active: false }));
    const bg = document.getElementById('bubbles-group');
    const bubbleElements = [];
    
    for(let i=0; i<maxBubbles; i++) {
      let c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('fill', 'none');
      c.setAttribute('stroke', '#FFFFFF');
      c.setAttribute('stroke-width', '1.5');
      c.setAttribute('opacity', '0');
      bg.appendChild(c);
      bubbleElements.push(c);
    }

    function spawnBubble(type) {
      let idx = bubbleData.findIndex(b => !b.active);
      if(idx !== -1) {
        bubbleData[idx] = {
          active: true,
          type: type,
          x: -25 + Math.random() * 50,
          y: 35 + Math.random() * 5,
          r: type === 'pre' ? 4 + Math.random() * 2 : 1.5 + Math.random(),
          speed: 1 + Math.random() * 0.5,
          phase: Math.random() * Math.PI * 2
        };
      }
    }

    function renderBubbles() {
      if (temp > 80 && temp < 100 && Math.random() < 0.2) spawnBubble('pre');
      if (temp >= 100 && Math.random() < 0.5) spawnBubble('boil');

      bubbleData.forEach((b, i) => {
        let el = bubbleElements[i];
        if (b.active) {
          b.y -= b.speed;
          if (b.type === 'pre') b.r = Math.max(0, b.r - 0.04);
          else b.r = Math.min(8, b.r + 0.1);
          
          let displayX = b.x + Math.sin(b.y * 0.1 + b.phase) * 1.5; 
          
          if (b.y < -15 || b.r <= 0) b.active = false;
          
          if (b.active) {
            el.setAttribute('cx', displayX);
            el.setAttribute('cy', b.y);
            el.setAttribute('r', b.r);
            el.setAttribute('opacity', '0.8');
          } else {
            el.setAttribute('opacity', '0');
          }
        }
      });
    }

    function renderThermometers() {
      const sLine = document.getElementById('thermo-line');
      sLine.setAttribute('y', 80 - temp * 1.5);
      sLine.setAttribute('height', temp * 1.5);

      const bLine = document.getElementById('big-thermo-line');
      bLine.setAttribute('y', 195 - temp * 3);
      bLine.setAttribute('height', temp * 3 - 45);
    }

    let lastTime = 0;
    let realLastTime = performance.now();

    function update(time) {
      requestAnimationFrame(update);
      
      let realDt = time - realLastTime;
      realLastTime = time;

      if (!isPaused && swRunning) {
        swTime += realDt;
        updateStopwatchDisplay();
      }

      if(isPaused) return;
      if(time - lastTime < 30) return;
      lastTime = time;

      let isHeating = assembled.lamp && assembled.mesh && assembled.beaker && assembled.thermometer;
      
      if (isHeating) {
        if (temp < 100) temp += 0.05;
        if (temp >= 100) temp = 100;
      } else {
        if (temp > 20) temp -= 0.04;
        if (temp <= 20) temp = 20;
      }

      renderThermometers();
      renderBubbles();

      document.getElementById('text-temp').textContent = temp.toFixed(1) + ' ℃';
      
      let status = "未全组装 (常温)";
      let color = "#6C757D";
      if (isHeating) {
        if (temp < 100) { status = "持续加热升温中..."; color = "#E63946"; }
        else { status = "剧烈沸腾！(恒温)"; color = "#E63946"; }
      } else {
        if(temp > 20) { 
           status = assembled.lamp ? "未全组装 (降温)" : "撤走热源冷却中..."; 
           color = "#457B9D"; 
        }
        else if (assembled.mesh && assembled.beaker && assembled.thermometer) {
           status = "已组装，待加热";
           color = "#343A40";
        }
      }
      const statusEl = document.getElementById('text-status');
      statusEl.textContent = status;
      statusEl.setAttribute('fill', color);
    }

    requestAnimationFrame(update);
  </script>

</body></html>
